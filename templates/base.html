<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}MFA Reset Portal{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/site.css') }}" />
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-sm navbar-dark bg-primary border-bottom box-shadow mb-3">
            <div class="container">
                <a class="navbar-brand d-flex align-items-center" href="{{ url_for('home.index') }}">
                    <img src="{{ url_for('static', filename='images/pepkor-logo.png') }}" alt="Pepkor Lifestyle" style="height:32px;" class="me-2" />
                    <span>MFA Reset Portal</span>
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target=".navbar-collapse">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="navbar-collapse collapse d-sm-inline-flex justify-content-between">
                    <ul class="navbar-nav flex-grow-1">
                        <li class="nav-item"><a class="nav-link" href="{{ url_for('home.index') }}">Home</a></li>
                    </ul>
                    <ul class="navbar-nav">
                        {% if session.get('user') %}
                        <li class="nav-item"><span class="nav-link text-light">{{ session.user }}</span></li>
                        <li class="nav-item">
                            <form action="{{ url_for('account.logout') }}" method="post" class="d-inline">
                                <input type="hidden" name="return_url" value="{{ request.url }}" />
                                <button type="submit" class="btn btn-link nav-link text-light">Logout</button>
                            </form>
                        </li>
                        {% endif %}
                    </ul>
                </div>
            </div>
        </nav>
    </header>
    <div class="container">
        <main role="main" class="pb-3">
            {% block content %}{% endblock %}
        </main>
    </div>
    <footer class="border-top footer text-muted">
        <div class="container">&copy; {{ year }} - MFA Reset Portal</div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - MFA Reset Portal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/site.css') }}" />
    <style>
        .login-bg {
            min-height: 100vh;
            background-image: url("{{ url_for('static', filename='images/login-bg.png') }}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-overlay {
            background-color: rgba(255, 255, 255, 0.88);
            border-radius: 0.75rem;
            box-shadow: 0 .5rem 1rem rgba(0, 0, 0, .15);
        }
    </style>
</head>
<body>
    <div class="login-bg">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-5">
                    <div class="card login-overlay">
                        <div class="card-body p-5">
                            <h2 class="card-title text-center mb-4">MFA Reset Portal</h2>
                            <form action="{{ url_for('account.login') }}" method="post">
                                <input type="hidden" name="ReturnUrl" value="{{ return_url or '' }}" />
                                {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
                                <div class="mb-3">
                                    <label for="Username" class="form-label">Username</label>
                                    <input type="text" id="Username" name="Username" class="form-control" placeholder="Enter your username" value="{{ username or '' }}" autofocus />
                                </div>
                                <div class="mb-3">
                                    <label for="Password" class="form-label">Password</label>
                                    <input type="password" id="Password" name="Password" class="form-control" placeholder="Enter your password" />
                                </div>
                                <button type="submit" class="btn btn-primary w-100">Sign In</button>
                            </form>
                            <p class="text-muted small mt-3 text-center">Sign in with your Active Directory credentials.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
